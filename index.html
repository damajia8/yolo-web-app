<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YOLOv5 电子元件智能识别系统</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/onnxruntime-web/1.14.0/ort.min.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 5px;
            color: #00FF00;
            text-shadow: 0 0 10px rgba(0,255,0,0.2);
            text-align: center;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 15px;
            text-align: center;
        }

        /* 核心修正：构建绝对定位的父级上下文，确保 Canvas 与 Video 物理尺寸及坐标完美重合 */
        .camera-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            background-color: #000;
            border: 2px solid #333;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        #camera-stream {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        /* 核心修正：Canvas 绝对定位死死覆盖在视频正上方，z-index 确保能接收手机 Touch 事件 */
        #detection-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            touch-action: none; /* 阻止手机端的默认手势干扰 */
        }

        .button-group {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 500px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #start-btn {
            background-color: #00FF00;
            color: #000;
        }

        #start-btn:disabled {
            background-color: #1e3d1e;
            color: #666;
            cursor: not-allowed;
        }

        #stop-btn {
            background-color: #ff3b30;
            color: #fff;
        }

        #stop-btn:disabled {
            background-color: #3d1e1e;
            color: #666;
            cursor: not-allowed;
        }

        #loading {
            width: 100%;
            max-width: 500px;
            text-align: center;
            padding: 12px;
            margin-top: 10px;
            background-color: #1a1a1a;
            border: 1px dashed #00FF00;
            color: #00FF00;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .result-panel {
            width: 100%;
            max-width: 500px;
            margin-top: 20px;
            background-color: #1a1a1a;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
        }

        .result-panel h3 {
            font-size: 1rem;
            margin-bottom: 10px;
            color: #fff;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }

        #result-list {
            list-style: none;
            max-height: 150px;
            overflow-y: auto;
        }

        /* 手机端列表卡片美化，增大触控条目面积 */
        .result-item {
            background-color: #262626 !important;
            color: #fff !important;
            border-left: 4px solid #00FF00 !important;
            padding: 12px !important;
            margin-bottom: 8px !important;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .result-item::after {
            content: "详情 ➔";
            font-size: 0.75rem;
            color: #00FF00;
        }
    </style>
</head>
<body>

    <h1>ELECTRONIC COMPONENT AI</h1>
    <div class="subtitle">手机端专版：框内或下方列表点击标签可跳转详情</div>

    <div class="camera-container">
        <video id="camera-stream" autoplay playsinline webkit-playsinline muted></video>
        <canvas id="detection-canvas"></canvas>
    </div>

    <div id="loading">正在加载核心标签库与 AI 识别模型...</div>

    <div class="button-group">
        <button id="start-btn" disabled>开启识别相机</button>
        <button id="stop-btn" disabled>暂停服务</button>
    </div>

    <div class="result-panel">
        <h3>实时检测结果面板</h3>
        <ul id="result-list">
            <li style="color:#666; text-align:center; padding: 10px; list-style: none;">等待相机开启...</li>
        </ul>
    </div>

    <script src="./app.js"></script>
</body>
</html>
